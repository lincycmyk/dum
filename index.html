<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaimCapsule | Enterprise Billing & RCM Solutions</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* [Insert all your CSS here] */
        :root { --brand-main-blue: #0A3A6B; --brand-deep-blue: #0A2540; --brand-footer-blue: #0A3A6B; --action-orange: #FF6B35; --text-dark: #1A202C; --text-muted: #4A5568; --bg-light: #F8F9FA; --bg-tint: #F0F7FF; --border-color: #E2E8F0; --shadow-sm: 0 2px 4px rgba(10, 58, 107, 0.02); --shadow-md: 0 10px 30px rgba(10, 58, 107, 0.05); --shadow-lg: 0 20px 50px rgba(10, 58, 107, 0.12); --transition-bounce: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; color: var(--text-dark); line-height: 1.6; background-color: #FFFFFF; overflow-x: hidden; }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
        .section-padding { padding: 80px 0; }
        .bg-tint-block { background-color: var(--bg-tint); }
        /* ... (Include the rest of your original CSS styles here) ... */
    </style>
</head>
<body>
    <header>...</header>
    <section class="hero-section">...</section>

    <section id="qualification-wizard" class="wizard-section bg-tint-block">
        <div class="container">
            <div class="section-header">
                <h2 class="section-title">Calculate Your Clean Claim Revenue Upside</h2>
                <p class="section-subtitle">Provide your practice profile data details to configure matching performance frameworks.</p>
            </div>
            <div class="form-wrapper">
                <div id="wizard-step-text" class="step-tracker">Step 1 of 3: Specialty Parameters</div>
                <div class="progress-bar-container">
                    <div id="wizard-progress-bar" class="progress-bar-fill"></div>
                </div>
                <form id="engine-wizard-form" onsubmit="event.preventDefault();">
                    <div class="wizard-panel active-panel" data-step="1">
                        <h3>Select Your Practice Domain Specialty:</h3>
                        <div class="card-grid">
                            <button type="button" class="select-card" onclick="advanceWizardStep(2)">Dermatology</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(2)">Ophthalmology</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(2)">Neurology</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(2)">Pediatrics</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(2)">Other</button>
                        </div>
                    </div>
                    <div class="wizard-panel" data-step="2">
                        <h3>What is your estimated average monthly claim volume?</h3>
                        <div class="card-grid">
                            <button type="button" class="select-card" onclick="advanceWizardStep(3)">Less than $25,000 / mo</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(3)">$25,000 - $75,000 / mo</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(3)">$75,000 - $200,000 / mo</button>
                            <button type="button" class="select-card" onclick="advanceWizardStep(3)">Over $200,000 / mo</button>
                        </div>
                    </div>
                    <div class="wizard-panel" data-step="3">
                        <h3>Final Verification Details:</h3>
                        <div class="fields-vertical-stack">
                            <input type="text" name="clinic_name" placeholder="Practice/Clinic Name" required>
                            <input type="text" name="state" placeholder="State" required>
                            <select name="best_time" required style="padding: 18px; border: 2px solid #E2E8F0; border-radius: 8px; width: 100%;">
                                <option value="">Best time to call</option>
                                <option value="morning">Morning</option>
                                <option value="afternoon">Afternoon</option>
                                <option value="evening">Evening</option>
                            </select>
                            <label style="display: flex; gap: 10px; font-size: 14px; color: #4A5568;">
                                <input type="checkbox" name="consent" required> By submitting, you agree to be contacted by phone/email.
                            </label>
                        </div>
                        <button type="submit" class="submit-cta">Generate Custom Revenue Analysis Report →</button>
                    </div>
                </form>
            </div>
        </div>
    </section>
